<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YaMa Fisher</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main class="popup" aria-live="polite">
        <section class="screen" id="loading-screen">
            <div class="screen__icon" aria-hidden="true">…</div>
            <h1>Page is loading</h1>
            <p>Please wait while YaMa Fisher reads the open collection.</p>
        </section>

        <section class="screen" id="authorization-screen" hidden>
            <div class="screen__icon" aria-hidden="true">♫</div>
            <h1>Sign-in required</h1>
            <p>
                Sign in to Yandex Music so YaMa Fisher can get the collection details
                for downloading.
            </p>
            <a class="button button--primary" id="authorize-link" href="#">Sign in</a>
        </section>

        <div id="collection-card-slot"></div>

        <section class="screen" id="error-screen" hidden>
            <div class="screen__title-row">
                <div class="screen__icon screen__icon--error" aria-hidden="true">!</div>
                <h1 id="error-title">Could not load the collection</h1>
            </div>
            <p id="error-message">Open a supported collection in Yandex Music and try again.</p>
            <button class="button button--secondary button--retry" id="retry"
                    type="button">Retry</button>
        </section>

        <div id="downloads-slot"></div>
    </main>
    <script src="../src/protocol.js"></script>
    <script src="../src/config.js"></script>
    <script src="../src/collection-types.js"></script>
    <script type="module" src="../src/popup/popup.js"></script>
</body>
</html>
